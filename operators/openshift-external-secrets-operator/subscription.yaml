apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: openshift-external-secrets-operator
  namespace: openshift-external-secrets-operator
  annotations:
    # ESO ist installiert aber nicht konfiguriert
    # Konfiguration erfolgt in Produktion ueber externen Vault + ClusterSecretStore
