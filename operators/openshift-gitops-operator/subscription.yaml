apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: openshift-gitops-operator
  namespace: openshift-gitops-operator
  annotations:
    # GitOps Operator wird initial manuell via bootstrap/gitops-operator/ installiert
    # ArgoCD adoptiert diese Ressourcen beim ersten Sync (Wave 1)
    # DEV/CRC: installPlanApproval: Automatic
    # PROD:    installPlanApproval: Manual
spec:
  channel: latest
  name: openshift-gitops-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
