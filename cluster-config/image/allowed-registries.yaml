apiVersion: config.openshift.io/v1
kind: Image
metadata:
  name: cluster
spec:
  registrySources:
    allowedRegistries:
      - registry.redhat.io
      - registry.access.redhat.com
      - registry.connect.redhat.com
      - quay.io
      - docker.io
      - image-registry.openshift-image-registry.svc:5000
      - quay.io/openshift-release-dev