apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openshift-gitops-argocd-application-controller-cluster-admin
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    # ArgoCD Application Controller benötigt cluster-admin um Ressourcen
    # in allen Namespaces verwalten zu können.
    # Zugriffskontrolle erfolgt über AppProjects (sourceRepos, destinations,
    # clusterResourceWhitelist) — nicht über RBAC direkt.
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
