apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-admins-cluster-admin
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    # Alle Mitglieder der Gruppe "cluster-admins" erhalten cluster-admin Rechte.
    # Mitglieder werden in cluster-config/groups/cluster-admins.yaml verwaltet.
subjects:
  - kind: Group
    name: cluster-admins
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
