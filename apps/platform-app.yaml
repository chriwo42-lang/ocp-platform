apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-app
  namespace: openshift-gitops
  annotations:
    # platform-app verwaltet sich selbst — nach dem Bootstrap wird diese Datei
    # von ArgoCD aus apps/platform-app.yaml aktualisiert (selfHeal: true).
    # Änderungen nur hier vornehmen, nicht in bootstrap/platform-app.yaml.
spec:
  project: platform
  source:
    repoURL: https://github.com/chriwo42-lang/ocp-platform.git
    targetRevision: main
    path: apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
