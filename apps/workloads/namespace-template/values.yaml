namespace: ""
resourceQuota:
  requests:
    cpu: "4"
    memory: 4Gi
  limits:
    cpu: "8"
    memory: 8Gi
  pods: "20"
networkPolicy:
  allowIngressFromRouter: true
  allowIngressFromMonitoring: true
limitRange:
  default:
    cpu: 500m
    memory: 512Mi
  defaultRequest:
    cpu: 100m
    memory: 128Mi
  max:
    cpu: "2"
    memory: 2Gi