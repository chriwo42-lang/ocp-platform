apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workloads-app
  namespace: openshift-gitops
  annotations:
    # Wave 0: workloads-app startet nach cluster-config (Wave -1).
    # cluster-config muss zuerst fertig sein damit der ArgoCD Application
    # Controller die nötigen Berechtigungen hat (argocd-cluster-admin CRB).
    # Die interne Reihenfolge innerhalb von workloads-app wird durch
    # eigene Wave Annotations in ocp-workloads/apps/ gesteuert.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    repoURL: https://github.com/chriwo42-lang/ocp-workloads.git
    targetRevision: main
    path: apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
