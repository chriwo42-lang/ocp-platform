apiVersion: argoproj.io/v1beta1
kind: Application
metadata:
  name: platform-app
  namespace: openshift-gitops
spec:
  project: platform
  source:
    repoURL: https://github.com/chriwo42-lang/ocp-platform.git
    targetRevision: main
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
